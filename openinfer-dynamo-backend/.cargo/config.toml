# This crate is its own cargo workspace (see Cargo.toml `[workspace]`), so it
# does NOT inherit the dynamo git checkout's `.cargo/config.toml`. dynamo-runtime
# calls tokio's unstable runtime-metrics APIs (RuntimeMetrics::worker_steal_count,
# Builder::enable_metrics_poll_time_histogram, ...) which only exist under
# `--cfg tokio_unstable`. Without this flag dynamo-runtime fails to compile
# (E0599: no method named ...), so the requirement is encoded here rather than
# left to an ambient global ~/.cargo/config.toml that only happens to be set on
# one developer's box.
[build]
rustflags = ["--cfg", "tokio_unstable"]
